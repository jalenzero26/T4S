<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Checkout — T4S</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/site.css">
  </head>
  <body>
    <nav class="container">
      <div class="brand">
        <img src="assets/1677894746750.png" alt="T4S" style="width:56px;height:56px" />
      </div>
      <div class="header-actions">
        <button class="btn" onclick="location.href='product.html'">Continue shopping</button>
      </div>
    </nav>
    <main class="container" style="margin-top:24px">
      <h1>Checkout</h1>
      <div id="checkout-area"></div>
      <button id="place-order" class="btn" style="margin-top:12px">Place order (simulate)</button>
    </main>

    <div id="site-toast"></div>
    <script src="js/cart.js"></script>
    <script>
      async function renderCheckout(){
        const products = await (await fetch('data/products.json')).json();
        const items = window.Cart.get();
        const area = document.getElementById('checkout-area');
        if(items.length===0){ area.innerHTML='<p>Your cart is empty.</p>'; return }
        const rows = items.map(i=>{
          const p = products.find(x=>x.id===i.id) || {title:i.id,price:0};
          return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee"><div>${p.title} x ${i.qty}</div><div>PHP ${p.price * i.qty}</div></div>`
        }).join('');
        const total = items.reduce((s,i)=>{ const p=products.find(x=>x.id===i.id)||{price:0}; return s + p.price * i.qty},0);
        area.innerHTML = rows + `<div style="padding:12px 0;font-weight:700">Total: PHP ${total}</div>`;
      }
      document.getElementById('place-order').addEventListener('click', ()=>{
        window.Cart.clear();
        renderCheckout();
        const t = document.getElementById('site-toast'); t.textContent='Order placed (simulation)'; t.classList.add('visible'); setTimeout(()=>t.classList.remove('visible'),2000);
      });
      renderCheckout();
    </script>
  </body>
</html>

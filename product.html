<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T4S | Products</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/site.css" />
  </head>
  <body>
    <nav class="container">
      <div class="brand">
        <img src="assets/1677894746750.png" alt="T4S" style="width:56px;height:56px" />
      </div>
      <div class="header-actions">
        <input id="search-input" class="search" placeholder="Search products..." />
        <button class="btn" onclick="location.href='checkout.html'">Checkout</button>
      </div>
    </nav>

    <main class="container" style="margin-top:24px">
      <h1>Products</h1>
      <section id="products-grid" class="products-grid" aria-live="polite"></section>
    </main>

    <div class="cart-float">
      <button class="cart-button" onclick="location.href='checkout.html'">Cart (<span id="cart-count">0</span>)</button>
    </div>
    <div id="site-toast"></div>

    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
  </body>
</html>
